    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="152" y="332" width="720" height="360" rx="180" fill="url(#panel)" filter="url(#shadow)"/>
  <circle cx="312" cy="512" r="92" fill="url(#glowRed)"/>
  <circle cx="512" cy="512" r="92" fill="url(#glowYellow)"/>
  <circle cx="712" cy="512" r="92" fill="url(#glowGreen)"/>
</svg>
