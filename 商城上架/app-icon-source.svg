<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18262b"/>
      <stop offset="1" stop-color="#0b1114"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#31464d"/>
      <stop offset="1" stop-color="#223136"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ff8a80" stop-opacity="1"/>
      <stop offset="1" stop-color="#ff3d33" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glowYellow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ffe996" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffc714" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="60%">
